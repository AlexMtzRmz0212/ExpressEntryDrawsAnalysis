name: Refresh Express Entry draws

# Independent backup scheduler.
#
# Why this exists: Vercel's cron job (vercel.json → /api/cron) runs on the Hobby
# plan, where scheduled jobs are best-effort — they can be delayed or skipped
# entirely, and run at most once per day. That is what caused draws to be missed.
# This workflow pings the refresh endpoint several times a day from GitHub's own
# scheduler, so a skipped Vercel run (or IRCC publishing its JSON feed a few hours
# after a round) still gets picked up the same day.
#
# /api/refresh does an unconditional, idempotent upsert (on_conflict=draw_number),
# so calling it repeatedly is safe and cheap — existing draws are no-ops.
#
# Required repository configuration (Settings → Secrets and variables → Actions):
#   Secret:   REFRESH_SECRET   — must match the REFRESH_SECRET env var on Vercel
#   Variable: BASE_URL         — e.g. https://ee.bittobyte.qzz.io (optional; the
#                                default below is used if the variable is unset)
#
# Note: GitHub scheduled workflows only run from the default branch, may be
# delayed under load, and are auto-disabled after 60 days of repo inactivity.
# Use "Run workflow" (workflow_dispatch) to trigger a run manually at any time.

on:
  schedule:
    # Windowed poll: every 3h across 09:00–21:00 UTC only (09/12/15/18/21), the
    # span in which IRCC realistically publishes a round's JSON. No overnight runs.
    # Minute :23 (not :00) dodges the congested top-of-hour GitHub cron slot and
    # avoids colliding with the Vercel daily cron. Off-window draws (rare) are
    # caught by the 09:23 run, the Vercel daily cron, or a user's "Check now" press.
    - cron: "23 9,12,15,18,21 * * *"
  workflow_dispatch: {}

# Don't stack runs if a previous one is still going.
concurrency:
  group: refresh-draws
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger refresh endpoint
        env:
          REFRESH_SECRET: ${{ secrets.REFRESH_SECRET }}
          BASE_URL: ${{ vars.BASE_URL || 'https://ee.bittobyte.qzz.io' }}
        run: |
          if [ -z "$REFRESH_SECRET" ]; then
            echo "::error::REFRESH_SECRET secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Calling $BASE_URL/api/refresh"
          # Retry transient failures. IRCC's canada.ca feed is flaky (timeouts,
          # sporadic 403s), and /api/refresh returns 502 when that upstream fetch
          # fails — but the upsert is idempotent, so retrying is safe. We drop
          # curl's -f (which discards the body on 5xx) and instead capture the
          # status + response body every attempt, so a real failure is legible.
          http_code=""
          for attempt in 1 2 3; do
            http_code=$(curl -sS -o /tmp/refresh_resp.json -w "%{http_code}" \
              -X POST "$BASE_URL/api/refresh" \
              -H "Authorization: Bearer $REFRESH_SECRET" \
              -H "Content-Type: application/json") || true
            echo "Attempt $attempt -> HTTP ${http_code:-<no response>}"
            echo "Response body:"; cat /tmp/refresh_resp.json 2>/dev/null; echo
            [ "$http_code" = "200" ] && exit 0
            [ "$attempt" != "3" ] && sleep 20
          done
          echo "::error::refresh failed after 3 attempts (last HTTP ${http_code:-<no response>}). See response body above."
          exit 1
