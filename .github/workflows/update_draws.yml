name: Daily Data Sync

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC every day
  workflow_dispatch:        # Allow manual trigger from the Actions UI

permissions:
  contents: write           # Needed to push updated JSON files

jobs:
  update-draws:
    name: Fetch & Update Express Entry Data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests numpy pandas structlog

      - name: Run ETL script
        run: python scripts/update_draws.py

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/analyses/ data/analysis_raw.json
          # Only commit if there are staged changes
          git diff --cached --quiet || git commit -m "chore: sync Express Entry draw data [skip ci]"
          git push
